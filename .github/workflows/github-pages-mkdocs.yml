name: Deploy MkDocs

permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  release:
      types:
        - published
  # NOTE: removed the `workflow_run` trigger that previously listened for
  # `github-release` completion. The `release` event above fires when the
  # release is published — same effect, but it is GitHub-owned and cannot
  # be triggered from a fork, side-stepping the CodeQL
  # `actions/untrusted-checkout/high` finding on the privileged deploy job.

jobs:
  deploy-pr:
      if: github.event_name == 'pull_request'
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: serapeum-org/github-actions/actions/mkdocs-deploy@38edf6028477d823ab42ea059ee694fc89dad1e9 # mkdocs/v1.1.0
        with:
          trigger: 'pull_request'
          package-manager: 'pixi'
          install-groups: 'docs'
          deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
    - uses: serapeum-org/github-actions/actions/mkdocs-deploy@38edf6028477d823ab42ea059ee694fc89dad1e9 # mkdocs/v1.1.0
      with:
        trigger: 'main'
        package-manager: 'pixi'
        install-groups: 'docs'
        deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}

  deploy-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0

    - name: Extract version from pyproject.toml
      id: version
      run: |
        VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
        echo "tag=$VERSION" >> $GITHUB_OUTPUT

    - uses: serapeum-org/github-actions/actions/mkdocs-deploy@38edf6028477d823ab42ea059ee694fc89dad1e9 # mkdocs/v1.1.0
      with:
        trigger: 'release'
        package-manager: 'pixi'
        install-groups: "docs"
        deploy-token: ${{ secrets.ACTIONS_DEPLOY_TOKEN }}
        release-tag: ${{ github.event.release.tag_name || steps.version.outputs.tag }}
        mike-alias: 'latest'
