name: pypi-release

# Trigger only on a real GitHub Release being published (created by the
# `github-release` workflow). Avoids the `workflow_run` + checkout-from-event
# pattern that CodeQL flags as `actions/untrusted-checkout/high` (CWE-829):
# the `release` event is GitHub-owned, cannot fire from a fork PR, and the
# default checkout resolves the release's own commit SHA — there's no
# attacker-controlled ref to substitute.
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Build and publish to PyPI
        uses: serapeum-org/github-actions/actions/release/pypi@aadd88f55aa024d5047447bb28adbd25c4e994b0 # pypi-release/v1.0.1
        with:
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          package-manager: 'pixi'
          install-groups: 'dev'
          verify-lock: 'false'
