name: pypi-release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['github-release']
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Security: when triggered via `workflow_run`, require that the upstream
    # workflow ran from the base repository (not a fork) so we can never run
    # untrusted code in a context that holds `secrets.PYPI_PUBLISH`.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_repository.fork == false) }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          # Pin to the immutable SHA recorded on the originating run, not the
          # mutable `head_branch` label (CWE-829: actions/untrusted-checkout).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Build and publish to PyPI
        uses: serapeum-org/github-actions/actions/release/pypi@6823246a90df2963d1576ef6de875e10467c64aa # pypi-release/v1.3.5
        with:
          pypi-username: __token__
          pypi-password: ${{ secrets.PYPI_PUBLISH }}
          package-manager: 'pixi'
          install-groups: 'dev'
          verify-lock: 'false'
